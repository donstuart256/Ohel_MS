services:
  - type: web
    name: uganda-sms-backend
    env: docker
    rootDir: backend
    plan: free # Can upgrade later
    envVars:
      # Expecting Supabase credentials to be provided in the Render Dashboard
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: uganda-sms-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: redis
    name: uganda-sms-redis
    plan: free
    ipAllowList: [] # Required by Render - restricts access to internal services only
